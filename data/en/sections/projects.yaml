  summary: Designed and built a subsonic wind tunnel, which is capable of achieving air speeds close to 30m/s in the test section with expected low intensity turbulence level, making it available for research in areas such as low speed aerodynamics, etc.
  tags: ["Design", "CAD", "CFD", "Manufacturing", "Research"]
