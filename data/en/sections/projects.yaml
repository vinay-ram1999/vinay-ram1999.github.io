- name: Accelerating a Hypersonic CO2 Reaction Solver
  role: Team Lead
  timeline: "July 2020 - May 2021"
  url: "files/UG_thesis.pdf"
  summary: A 2-D unstructured finite volume method (FVM) based framework is developed using an automatic code generation approach based on the symbolic Python package SymPy. The generated solver is capable of simulating flows in both Perfect gas and CO2 rich Martian environments.
  tags: ["Parallel Computing", "OP2", "OpenMP", "CUDA", "Academic"]

- name: Design and Analysis of Heat Sink
  role: Design
  timeline: "October 2020 - December 2021"
  # url: ""
  summary: Designed and analysed a 2-D heat sink made of Aluminium and a layer of epoxy between the chip and heat sink with specified thermal properties as a thermal design solution for cooling a noval chip using CFD-HT (Computational Fluid Dynamics and Heat Transfer) software ANSYS Fluent.
  tags: ["Thermal Design", "Ansys Fluent", "Heat Sink", "Academic"]
