  publishedIn:
    name: 26th National and 4th International ISHMT-ASTFE Heat and Mass Transfer Conference
    date: 17-20 Dec 2021
    url: "https://icsrpis.iitm.ac.in/events/ihmtc2021/"
  authors:
  - name: Vinay R. Gazula
    url: "#"
  - name: Dinesh S. Devarasetty
    url: ""
  - name: Dr. Satya P. Jammy
    url: "https://scholar.google.com/citations?user=n5WUVWAAAAAJ&hl=en&oi=sra"
  paper:
    summary: A 2-D unstructured finite volume method (FVM) based framework is developed using an automatic code generation approach based on the symbolic Python package SymPy. The generated solver is capable of simulating flows in both Perfect gas and CO2 rich Martian environments. The generated solver is auto parallelized by the OP2 framework and it is capable of running on single/multi core CPU's using OpenMP and Nvidia GPU's using CUDA architecture.
    url: "https://ishmtdigitallibrary.com/conferences/486d924a7e5ad8c3,393f7ffc7879d8ca,2aa0e4f13f8adbd7.html"
